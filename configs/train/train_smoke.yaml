seed: 42
output_dir: "checkpoints/qwen2b-mn-smoke"
logging_dir: "logs"
report_to: "none"

max_seq_length: 512
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 2

learning_rate: 2.0e-5
weight_decay: 0.1
warmup_ratio: 0.03
lr_scheduler_type: "cosine"
num_train_epochs: 1
max_steps: 50

logging_steps: 5
eval_steps: 25
save_steps: 25
save_total_limit: 2
evaluation_strategy: "steps"
save_strategy: "steps"

bf16: true
fp16: false
gradient_checkpointing: true
dataloader_num_workers: 2
remove_unused_columns: false
