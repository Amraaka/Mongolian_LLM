seed: 42
output_dir: "checkpoints/qwen2b-mn"
logging_dir: "logs"
report_to: "wandb"

# Sequence and batching
max_seq_length: 2048
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 16

# Schedule
learning_rate: 2.0e-5
weight_decay: 0.1
warmup_ratio: 0.03
lr_scheduler_type: "cosine"
num_train_epochs: 1
max_steps: 5000

# Logging, eval, save
logging_steps: 10
eval_steps: 250
save_steps: 250
save_total_limit: 3
evaluation_strategy: "steps"
save_strategy: "steps"

# Runtime
bf16: true
fp16: false
gradient_checkpointing: true
dataloader_num_workers: 4
remove_unused_columns: false
